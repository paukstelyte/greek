<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Greek A1 Vocabulary</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap');
  :root{--bg:#deeef8;--surface:#fff;--surface2:#edf5fc;--ink:#0e1621;--blue:#1b3f72;--mid:#3468a8;--sky:#6aaad4;--fog:#c8dff0;--muted:#5a7a96;--border:rgba(100,160,210,0.25);--border2:rgba(100,160,210,0.4);--r:14px;}

  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Crimson Pro',Georgia,serif;background:var(--bg);color:var(--ink);min-height:100vh;}
  nav{background:var(--blue);padding:.9rem 2rem;display:flex;align-items:center;justify-content:space-between;}
  .nav-title{font-family:'Barlow Condensed',sans-serif;font-size:1rem;font-weight:800;letter-spacing:.1em;color:#fff;text-transform:uppercase;}
  .nav-title span{color:var(--fog);font-weight:400;}
  .cat-bar{display:flex;gap:5px;padding:1rem 1.5rem .4rem;max-width:760px;margin:0 auto;flex-wrap:wrap;}
  .cat-btn{flex:1;min-width:80px;padding:.45rem .3rem;border:1px solid var(--border2);border-radius:var(--r);background:var(--surface);color:var(--muted);font-size:11px;font-weight:600;cursor:pointer;text-align:center;font-family:'Barlow Condensed',sans-serif;letter-spacing:.05em;text-transform:uppercase;transition:all .15s;line-height:1.3;}
  .cat-btn.active{background:var(--blue);color:#fff;border-color:var(--blue);}
  .score-bar{display:flex;gap:10px;padding:0 1.5rem .9rem;max-width:760px;margin:0 auto;}
  .score-card{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:.55rem;text-align:center;}
  .score-label{font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:2px;}
  .score-val{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;}
  .wrap{max-width:760px;margin:0 auto;padding:0 1.5rem 4rem;}
  .rule-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:.8rem 1.1rem;margin-bottom:.9rem;font-size:14px;color:var(--muted);line-height:1.7;}
  .rule-box strong{color:var(--ink);}
  .progress{font-size:12px;font-family:'Barlow Condensed',sans-serif;letter-spacing:.05em;color:var(--muted);text-align:center;margin-bottom:.5rem;}
  .q-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.6rem 1.5rem;text-align:center;margin-bottom:1rem;position:relative;min-height:120px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.35rem;}
  .q-badge{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--surface);background:var(--mid);padding:2px 10px;border-radius:20px;}
  .q-hint{font-size:12px;color:var(--muted);}
  .q-main{font-size:1.85rem;font-weight:600;color:var(--ink);line-height:1.25;}
  .q-sub{font-size:13px;color:var(--muted);font-style:italic;}
  .retry-badge{position:absolute;top:10px;right:12px;background:#fef3e2;color:#854F0B;font-size:10px;font-weight:600;padding:3px 9px;border-radius:20px;font-family:'Barlow Condensed',sans-serif;}
  .later-badge{position:absolute;top:10px;left:12px;background:#e8f0fb;color:#1a4a8a;font-size:10px;font-weight:600;padding:3px 9px;border-radius:20px;font-family:'Barlow Condensed',sans-serif;}
  .choices{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1rem;}
  .choice-btn{padding:.75rem .5rem;border:1px solid var(--border2);border-radius:var(--r);background:var(--surface);color:var(--ink);font-size:16px;cursor:pointer;font-family:'Crimson Pro',Georgia,serif;text-align:center;line-height:1.35;transition:background .12s;}
  .choice-btn:hover:not(:disabled){background:var(--surface2);}
  .choice-btn.correct{background:#EAF3DE;border-color:#639922;color:#3B6D11;}
  .choice-btn.wrong{background:#FCEBEB;border-color:#E24B4A;color:#A32D2D;}
  .choice-btn.reveal{background:#EAF3DE;border-color:#639922;color:#3B6D11;}
  .feedback{border-radius:var(--r);padding:.8rem 1rem;margin-bottom:1rem;font-size:14px;line-height:1.65;}
  .feedback.correct{background:#EAF3DE;color:#3B6D11;border:1px solid #639922;}
  .feedback.wrong{background:#FCEBEB;color:#A32D2D;border:1px solid #E24B4A;}
  .next-btn{width:100%;padding:.75rem;border:1px solid var(--border2);border-radius:var(--r);background:var(--surface2);color:var(--ink);font-size:15px;cursor:pointer;font-family:'Crimson Pro',Georgia,serif;}
  .next-btn:hover{background:var(--surface);}
  .ref-section{margin-bottom:1.5rem;}
  .ref-title{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--mid);margin-bottom:.6rem;}
  .ref-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:5px;}
  .ref-row{display:flex;justify-content:space-between;align-items:baseline;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:.45rem .8rem;font-size:13px;gap:.5rem;}
  .ref-en{color:var(--muted);font-style:italic;flex:1;}
  .ref-gr{font-weight:600;color:var(--blue);text-align:right;}
  .ref-back-btn{width:100%;padding:.75rem;border:1px solid var(--border2);border-radius:var(--r);background:var(--surface);color:var(--ink);font-size:14px;cursor:pointer;font-family:inherit;margin-top:1rem;}
  .finish-screen{text-align:center;padding:2rem 1rem;}
  .finish-screen h2{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:800;letter-spacing:.05em;margin-bottom:.4rem;}
  .mistake-item{background:#FCEBEB;border-radius:var(--r);padding:.6rem 1rem;margin-bottom:.4rem;font-size:14px;color:#A32D2D;text-align:left;line-height:1.5;}
  .restart-btn{margin-top:1.25rem;padding:.75rem 2rem;border:1px solid var(--border2);border-radius:var(--r);background:var(--surface);color:var(--ink);font-size:15px;cursor:pointer;font-family:inherit;}
</style>
</head>
<body>
<nav>
  <div class="nav-title">Greek <span>Must Know Words</span></div>
  <div style="font-size:11px;color:rgba(255,255,255,0.5);letter-spacing:.1em;font-family:'Barlow Condensed',sans-serif">Units 1–6 · EN → GR</div>
</nav>
<div class="cat-bar">
  <button class="cat-btn active" id="cat-greetings" onclick="setCategory('greetings')">Greetings</button>
  <button class="cat-btn"        id="cat-questions" onclick="setCategory('questions')">Questions</button>
  <button class="cat-btn"        id="cat-family"    onclick="setCategory('family')">Family</button>
  <button class="cat-btn"        id="cat-jobs"      onclick="setCategory('jobs')">Jobs</button>
  <button class="cat-btn"        id="cat-transport" onclick="setCategory('transport')">Transport</button>
  <button class="cat-btn"        id="cat-places"    onclick="setCategory('places')">Places</button>
  <button class="cat-btn"        id="cat-everyday"  onclick="setCategory('everyday')">Everyday</button>
  <button class="cat-btn"        id="cat-all"       onclick="setCategory('all')">All mixed</button>
  <button class="cat-btn"        id="cat-ref"       onclick="setCategory('ref')">Reference</button>
</div>
<div class="score-bar" id="score-bar">
  <div class="score-card"><div class="score-label">Correct</div><div class="score-val" id="sc">0</div></div>
  <div class="score-card"><div class="score-label">Wrong</div><div class="score-val" id="sw">0</div></div>
  <div class="score-card"><div class="score-label">Streak</div><div class="score-val" id="ss">0</div></div>
</div>
<div class="wrap">
  <div id="quiz-view">
    <div class="rule-box" id="rule-box"></div>
    <div class="progress" id="prog">Question 1</div>
    <div class="q-card">
      <div class="retry-badge" id="retry-badge" style="display:none">↩ Try again</div>
      <div class="later-badge" id="later-badge" style="display:none">🔁 Review</div>
      <div class="q-badge" id="qbadge"></div>
      <div class="q-hint">How do you say this in Greek?</div>
      <div class="q-main" id="qmain">—</div>
      <div class="q-sub"  id="qsub"></div>
    </div>
    <div class="choices" id="choices"></div>
    <div class="feedback" id="fb" style="display:none"></div>
    <button class="next-btn" id="nb" style="display:none" onclick="nextQ()">Next →</button>
  </div>
  <div id="ref-view" style="display:none">
    <div class="ref-section"><div class="ref-title">Greetings &amp; Phrases</div><div class="ref-grid" id="ref-greetings"></div></div>
    <div class="ref-section"><div class="ref-title">Question Words</div><div class="ref-grid" id="ref-questions"></div></div>
    <div class="ref-section"><div class="ref-title">Family &amp; Marital Status</div><div class="ref-grid" id="ref-family"></div></div>
    <div class="ref-section"><div class="ref-title">Jobs / Professions</div><div class="ref-grid" id="ref-jobs"></div></div>
    <div class="ref-section"><div class="ref-title">Transport</div><div class="ref-grid" id="ref-transport"></div></div>
    <div class="ref-section"><div class="ref-title">Places in the city</div><div class="ref-grid" id="ref-places"></div></div>
    <div class="ref-section"><div class="ref-title">Everyday Words &amp; Verbs</div><div class="ref-grid" id="ref-everyday"></div></div>
    <button class="ref-back-btn" onclick="backFromRef()">← Back to practice</button>
  </div>
  <div id="finish-view" style="display:none">
    <div class="finish-screen">
      <h2 id="fin-msg"></h2>
      <p id="fin-score" style="color:var(--muted);font-size:15px;margin-bottom:.5rem"></p>
      <div id="fin-mistakes" style="margin-top:1rem;text-align:left"></div>
      <button class="restart-btn" onclick="restartCurrent()">Practice again →</button>
    </div>
  </div>
</div>

  {en:'the evening',gr:'το βράδυ',cat:'everyday'},
  {en:'today',gr:'σήμερα',cat:'everyday'},
  {en:'tomorrow',gr:'αύριο',cat:'everyday'},
  {en:'yesterday',gr:'χθες',cat:'everyday'},
  {en:'now',gr:'τώρα',cat:'everyday'},
  {en:'always',gr:'πάντα',cat:'everyday'},
  {en:'never',gr:'ποτέ',cat:'everyday'},
  {en:'every day',gr:'κάθε μέρα',cat:'everyday'},
  {en:'a lot / very',gr:'πολύ',cat:'everyday'},
  {en:'a little',gr:'λίγο',cat:'everyday'},
  {en:'not at all',gr:'καθόλου',cat:'everyday'},
  {en:'here',gr:'εδώ',cat:'everyday'},
  {en:'there',gr:'εκεί',cat:'everyday'},
  {en:'also / too',gr:'και / επίσης',cat:'everyday'},
  {en:'but',gr:'αλλά',cat:'everyday'},
  {en:'because',gr:'γιατί / επειδή',cat:'everyday'},
  {en:'big / large (m/f/n)',gr:'μεγάλος/-η/-ο',cat:'everyday'},
  {en:'small (m/f/n)',gr:'μικρός/-ή/-ό',cat:'everyday'},
  {en:'good (m/f/n)',gr:'καλός/-ή/-ό',cat:'everyday'},
  {en:'nice / beautiful (m/f/n)',gr:'ωραίος/-α/-ο',cat:'everyday'},
  {en:'new (m/f/n)',gr:'καινούριος/-α/-ο',cat:'everyday'},
  {en:'old — for objects (m/f/n)',gr:'παλιός/-ά/-ό',cat:'everyday'},
  {en:'close / near',gr:'κοντά',cat:'everyday'},
  {en:'far',gr:'μακριά',cat:'everyday'},
  {en:'easy',gr:'εύκολο',cat:'everyday'},
  {en:'difficult',gr:'δύσκολο',cat:'everyday'},
  {en:'I have',gr:'έχω',cat:'everyday'},
  {en:'I want',gr:'θέλω',cat:'everyday'},
  {en:'I know',gr:'ξέρω',cat:'everyday'},
  {en:'I understand',gr:'καταλαβαίνω',cat:'everyday'},
  {en:'I go',gr:'πάω',cat:'everyday'},
  {en:'I work',gr:'δουλεύω',cat:'everyday'},
  {en:'I study',gr:'σπουδάζω',cat:'everyday'},
  {en:'I speak',gr:'μιλάω',cat:'everyday'},
  {en:'I live / stay',gr:'μένω',cat:'everyday'},
  {en:'I look for / I search',gr:'ψάχνω',cat:'everyday'},
  {en:'I see / I watch',gr:'βλέπω',cat:'everyday'},
  {en:'I eat',gr:'τρώω',cat:'everyday'},
  {en:'I drink',gr:'πίνω',cat:'everyday'},
  {en:'I come',gr:'έρχομαι',cat:'everyday'},
  {en:'I leave / go out',gr:'βγαίνω',cat:'everyday'},
];

let curCat='greetings',q=[],idx=0,cor=0,wr=0,str=0,mist=[],answered=false;
function shuf(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a;}
function setScores(a,b,c){['sc','sw','ss'].forEach((id,i)=>document.getElementById(id).textContent=[a,b,c][i]);}
function sched(item){q.splice(idx+1,0,{...item,_retry:'immediate'});const d=Math.min(3+Math.floor(Math.random()*3),q.length-idx-1);q.splice(idx+2+d,0,{...item,_retry:'delayed'});}
function failRetry(item){const r=item._retry;if(!r)sched(item);else if(r==='immediate'){q.splice(idx+1,0,{...item,_retry:'immediate'});q.splice(Math.min(idx+4,q.length),0,{...item,_retry:'delayed'});}else q.splice(idx+1,0,{...item,_retry:'immediate'});}

const LABELS={greetings:'GREETINGS',questions:'QUESTION WORDS',family:'FAMILY',jobs:'JOBS',transport:'TRANSPORT',places:'PLACES',everyday:'EVERYDAY',all:'ALL MIXED'};
const RULES={
  greetings:'See the <strong>English</strong> — choose the correct <strong>Greek</strong> greeting or phrase.',
  questions:'See the <strong>English</strong> — choose the correct <strong>Greek</strong> question word.',
  family:   'See the <strong>English</strong> — choose the correct <strong>Greek</strong> family word.',
  jobs:     'See the <strong>English</strong> — choose the correct <strong>Greek</strong> job title.',
  transport:'See the <strong>English</strong> — choose the correct <strong>Greek</strong> transport word.',
  places:   'See the <strong>English</strong> — choose the correct <strong>Greek</strong> place.',
  everyday: 'See the <strong>English</strong> — choose the correct <strong>Greek</strong> everyday word, adjective or verb.',
  all:      'All categories mixed. <strong>English → Greek</strong>. Wrong answers come back twice!',
};

function setCategory(cat){
  curCat=cat;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('cat-'+cat).classList.add('active');
  ['ref-view','quiz-view','finish-view'].forEach(id=>document.getElementById(id).style.display='none');
  document.getElementById('score-bar').style.display='flex';
  if(cat==='ref'){document.getElementById('score-bar').style.display='none';buildRef();document.getElementById('ref-view').style.display='block';return;}
  document.getElementById('rule-box').innerHTML=RULES[cat]||'';
  document.getElementById('quiz-view').style.display='block';
  startQuiz();
}
function backFromRef(){document.getElementById('ref-view').style.display='none';document.getElementById('score-bar').style.display='flex';setCategory(curCat==='ref'?'greetings':curCat);}
function restartCurrent(){document.getElementById('finish-view').style.display='none';startQuiz();}

function startQuiz(){
  const pool=curCat==='all'?VOCAB:VOCAB.filter(v=>v.cat===curCat);
  q=shuf([...pool]);idx=0;cor=0;wr=0;str=0;mist=[];answered=false;
  setScores(0,0,0);
  document.getElementById('finish-view').style.display='none';
  document.getElementById('quiz-view').style.display='block';
  showQ();
}

function showQ(){
  answered=false;
  const item=q[idx];const r=item._retry||null;
  document.getElementById('retry-badge').style.display=r==='immediate'?'block':'none';
  document.getElementById('later-badge').style.display=r==='delayed'?'block':'none';
  document.getElementById('fb').style.display='none';
  document.getElementById('nb').style.display='none';
  document.getElementById('prog').textContent='Question '+(idx+1)+' of '+q.length;
  document.getElementById('qbadge').textContent=LABELS[item.cat]||'VOCAB';
  document.getElementById('qmain').textContent=item.en;
  document.getElementById('qsub').textContent='';

  const catPool=VOCAB.filter(v=>v.cat===item.cat&&v.gr!==item.gr);
  const pool=(catPool.length>=3?catPool:VOCAB.filter(v=>v.gr!==item.gr));
  const opts=shuf([item.gr,...shuf(pool).slice(0,3).map(v=>v.gr)]);
  const cc=document.getElementById('choices');cc.innerHTML='';
  opts.forEach(opt=>{const b=document.createElement('button');b.className='choice-btn';b.textContent=opt;b.onclick=()=>pick(opt,item);cc.appendChild(b);});
}

function pick(chosen,item){
  if(answered)return;answered=true;
  const ok=chosen===item.gr;
  document.querySelectorAll('.choice-btn').forEach(b=>{b.disabled=true;if(b.textContent===item.gr)b.classList.add(ok?'correct':'reveal');else if(b.textContent===chosen&&!ok)b.classList.add('wrong');});
  const fb=document.getElementById('fb');fb.style.display='block';
  if(ok){cor++;str++;fb.className='feedback correct';fb.innerHTML='✓ Correct! <strong>'+item.gr+'</strong>';document.getElementById('nb').textContent='Next →';}
  else{wr++;str=0;fb.className='feedback wrong';fb.innerHTML='✗ It\'s <strong>'+item.gr+'</strong>';mist.push(item);failRetry(item);document.getElementById('nb').textContent='Try again →';}
  setScores(cor,wr,str);document.getElementById('nb').style.display='block';
}
function nextQ(){idx++;if(idx>=q.length)showFinish();else showQ();}

function buildRef(){
  ['greetings','questions','family','jobs','transport','places','everyday'].forEach(cat=>{
    const el=document.getElementById('ref-'+cat);if(!el)return;el.innerHTML='';
    VOCAB.filter(v=>v.cat===cat).forEach(v=>{const d=document.createElement('div');d.className='ref-row';d.innerHTML='<span class="ref-en">'+v.en+'</span><span class="ref-gr">'+v.gr+'</span>';el.appendChild(d);});
  });
}

function showFinish(){
  document.getElementById('quiz-view').style.display='none';
  const tot=cor+wr,pct=tot?Math.round(cor/tot*100):0;
  document.getElementById('fin-msg').textContent=pct>=90?'Excellent! 🎉':pct>=70?'Good work! 👍':'Keep going! 📚';
  document.getElementById('fin-score').textContent=cor+' correct out of '+tot+' ('+pct+'%)';
  const mm=document.getElementById('fin-mistakes');mm.innerHTML='';
  if(mist.length){const hdr=document.createElement('p');hdr.style.cssText='font-size:13px;color:var(--muted);margin-bottom:8px';hdr.textContent='Words to review:';mm.appendChild(hdr);const seen=new Set();mist.forEach(m=>{if(!seen.has(m.gr)){seen.add(m.gr);const d=document.createElement('div');d.className='mistake-item';d.innerHTML=m.en+' → <strong>'+m.gr+'</strong>';mm.appendChild(d);}});}
  else mm.innerHTML='<p style="color:#3B6D11;font-size:14px">Perfect — no mistakes!</p>';
  document.getElementById('finish-view').style.display='block';
}

setCategory('greetings');
</script>
